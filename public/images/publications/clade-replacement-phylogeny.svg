<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Filogenia e substituição de clados</title>
  <desc id="desc">Árvore filogenética estilizada com ramos extintos e clados recentes em expansão.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#052e2b"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="branch" x1="0" x2="1"><stop stop-color="#93c5fd"/><stop offset="1" stop-color="#4ade80"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity=".12" stroke="#e0f2fe"><path d="M0 150 H1200M0 300 H1200M0 450 H1200M0 600 H1200M0 750 H1200"/><path d="M200 0 V900M400 0 V900M600 0 V900M800 0 V900M1000 0 V900"/></g>
  <g transform="translate(120 80)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M70 710 C178 600 222 504 280 420 C348 322 430 246 526 178" stroke="#cbd5e1" stroke-width="9" opacity=".8"/>
    <path d="M280 420 C374 448 450 506 520 586" stroke="#93c5fd" stroke-width="7" opacity=".8"/>
    <path d="M280 420 C390 380 470 326 565 238" stroke="url(#branch)" stroke-width="8" filter="url(#glow)"/>
    <path d="M520 586 C610 610 710 658 835 720" stroke="#ef4444" stroke-width="6" opacity=".78"/>
    <path d="M565 238 C666 180 754 136 890 102" stroke="#4ade80" stroke-width="8" filter="url(#glow)"/>
    <path d="M565 238 C675 252 770 284 900 348" stroke="#22c55e" stroke-width="8" filter="url(#glow)"/>
    <path d="M430 312 C520 348 610 395 740 454" stroke="#60a5fa" stroke-width="6" opacity=".75"/>
    <path d="M348 322 C450 250 555 198 690 132" stroke="#94a3b8" stroke-width="5" opacity=".55" stroke-dasharray="14 16"/>
    <path d="M374 448 C480 474 560 518 650 600" stroke="#94a3b8" stroke-width="5" opacity=".55" stroke-dasharray="14 16"/>
    <g stroke="#ef4444" stroke-width="5" opacity=".9"><path d="M818 704 l34 34M852 704 l-34 34"/><path d="M632 582 l28 28M660 582 l-28 28"/><path d="M672 114 l28 28M700 114 l-28 28"/></g>
    <g fill="#f8fafc" stroke="none" font-family="Inter, Arial, sans-serif">
      <text x="760" y="94" font-size="26" font-weight="700">clado em expansão</text>
      <text x="774" y="352" font-size="22">substituição</text>
      <text x="690" y="466" font-size="20" opacity=".85">linhagens persistentes</text>
      <text x="646" y="642" font-size="20" opacity=".72">ramos extintos</text>
    </g>
  </g>
  <g transform="translate(70 86)">
    <rect width="368" height="112" rx="18" fill="#f8fafc" opacity=".93"/>
    <text x="26" y="46" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#0f172a">Clade Replacement</text>
    <text x="26" y="80" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">filogenia, extinção e renovação evolutiva</text>
  </g>
</svg>