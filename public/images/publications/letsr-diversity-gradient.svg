<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de gradiente de diversidade</title>
  <desc id="desc">Mapa estilizado da América do Sul com gradiente de riqueza de espécies e pontos de ocorrência.</desc>
  <defs>
    <linearGradient id="ocean" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#082f49"/><stop offset="1" stop-color="#0f766e"/></linearGradient>
    <linearGradient id="richness" x1="0" x2="1" y1="1" y2="0"><stop stop-color="#dbeafe"/><stop offset="0.28" stop-color="#86efac"/><stop offset="0.58" stop-color="#22c55e"/><stop offset="0.82" stop-color="#facc15"/><stop offset="1" stop-color="#ef4444"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity=".28"/></filter>
    <radialGradient id="hotspot"><stop stop-color="#ef4444" stop-opacity=".95"/><stop offset=".42" stop-color="#facc15" stop-opacity=".78"/><stop offset="1" stop-color="#22c55e" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#ocean)"/>
  <g opacity=".22" stroke="#e0f2fe" stroke-width="1">
    <path d="M0 180 H1200M0 360 H1200M0 540 H1200M0 720 H1200"/><path d="M180 0 V900M360 0 V900M540 0 V900M720 0 V900M900 0 V900M1080 0 V900"/>
  </g>
  <g filter="url(#shadow)">
    <path d="M470 110 C530 116 566 150 582 198 C625 216 654 252 648 302 C700 344 719 408 682 464 C707 522 686 586 628 618 C617 682 585 735 530 765 C486 790 448 760 456 713 C398 688 365 636 383 582 C337 548 329 494 360 454 C320 401 321 340 365 301 C342 250 365 193 414 177 C414 137 434 112 470 110 Z" fill="url(#richness)" stroke="#f8fafc" stroke-width="5"/>
    <ellipse cx="520" cy="430" rx="230" ry="300" fill="url(#hotspot)" opacity=".74"/>
    <ellipse cx="455" cy="300" rx="138" ry="162" fill="url(#hotspot)" opacity=".45"/>
  </g>
  <g fill="#f8fafc" opacity=".94">
    <circle cx="472" cy="248" r="8"/><circle cx="530" cy="300" r="6"/><circle cx="584" cy="382" r="7"/><circle cx="512" cy="444" r="5"/><circle cx="448" cy="524" r="6"/><circle cx="564" cy="584" r="7"/><circle cx="498" cy="646" r="5"/><circle cx="622" cy="492" r="5"/><circle cx="408" cy="390" r="6"/>
  </g>
  <g transform="translate(78 92)">
    <rect width="330" height="158" rx="18" fill="#f8fafc" opacity=".92"/>
    <text x="26" y="50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">letsR</text>
    <text x="26" y="86" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">gradiente de diversidade</text>
    <rect x="26" y="112" width="250" height="18" rx="9" fill="url(#richness)"/>
    <text x="26" y="146" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">baixa riqueza</text>
    <text x="188" y="146" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">alta riqueza</text>
  </g>
</svg>